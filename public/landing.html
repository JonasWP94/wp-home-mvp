<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wechselpilot Home</title>
  <link rel="icon" href="/apps/wpilot-home/assets/logo-wp.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .anim-1 { animation: fadeInUp 0.5s ease forwards; }
    .anim-2 { animation: fadeInUp 0.6s 0.1s ease forwards; opacity: 0; }
    .anim-3 { animation: fadeInUp 0.6s 0.2s ease forwards; opacity: 0; }
    .anim-4 { animation: fadeInUp 0.6s 0.3s ease forwards; opacity: 0; }
    .anim-5 { animation: fadeInUp 0.6s 0.4s ease forwards; opacity: 0; }
    .btn-primary {
      background: linear-gradient(135deg, #F9AA00 0%, #F59E0B 100%);
      box-shadow: 0 4px 20px rgba(249,170,0,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 6px 28px rgba(249,170,0,0.5); }
    .btn-primary:active { transform: scale(0.97); }
  </style>
</head>
<body style="background:#F5F6F8; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px;">
  <div style="max-width:560px; width:100%; text-align:center;">

    <!-- Logo -->
    <div class="anim-1" style="display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:32px;">
      <img src="/apps/wpilot-home/assets/logo-wp.png" alt="Wechselpilot" height="28" style="object-fit:contain; flex-shrink:0;">
      <span style="color:#2C3E50; font-size:15px; font-weight:700; letter-spacing:0.05em;">HOME</span>
    </div>

    <!-- House illustration -->
    <div class="anim-2" style="margin-bottom:24px;">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100px; height:100px; margin:0 auto;">
        <circle cx="60" cy="60" r="55" fill="rgba(87,130,176,0.08)"/>
        <path d="M60 20 L95 50 L95 95 L25 95 L25 50 Z" fill="rgba(87,130,176,0.2)" stroke="#5782B0" stroke-width="2.5" stroke-linejoin="round"/>
        <rect x="50" y="60" width="20" height="35" rx="2" fill="#F9AA00" stroke="#E8920A" stroke-width="1.5"/>
        <rect x="32" y="58" width="14" height="14" rx="2" fill="rgba(87,130,176,0.3)" stroke="rgba(87,130,176,0.5)" stroke-width="1"/>
        <rect x="74" y="58" width="14" height="14" rx="2" fill="rgba(87,130,176,0.3)" stroke="rgba(87,130,176,0.5)" stroke-width="1"/>
        <path d="M60 12 L60 20 M50 18 L60 20 L70 18" stroke="#F9AA00" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Headline -->
    <div class="anim-2" style="margin-bottom:16px;">
      <h1 style="color:#2C3E50; font-size:clamp(24px,5vw,36px); font-weight:800; line-height:1.2; letter-spacing:-0.02em;">
        Der <span style="color:#F9AA00;">CFO</span> für Ihr Wohnzimmer.
      </h1>
    </div>

    <!-- Subline -->
    <div class="anim-3" style="margin-bottom:32px;">
      <p style="color:#7A8C9A; font-size:clamp(15px,2.5vw,17px); line-height:1.65;">
        Hier können Sie Ihre Haushaltsausgaben gemäß Ihres Verbrauchs und Ihren Interessen optimieren.
        Jede Frage hat einen konkreten Nutzen für Ihre persönlichen Sparplan.
      </p>
    </div>

    <!-- CTA -->
    <div class="anim-4" style="margin-bottom:28px;">
      <button
        class="btn-primary"
        onclick="window.location.href='/apps/wpilot-home/wizard/'"
        style="border:none; border-radius:16px; padding:16px 40px; font-size:16px; font-weight:700; color:#1a1a2e; cursor:pointer; font-family:inherit; letter-spacing:-0.01em;">
        Jetzt loslegen →
      </button>
    </div>

    <!-- Trust -->
    <div class="anim-5" style="display:flex; align-items:center; justify-content:center; gap:16px;">
      <div style="display:flex; align-items:center;">
        <div style="width:28px; height:28px; border-radius:50%; background:#5782B0; border:2px solid #F5F6F8; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div>
        <div style="width:28px; height:28px; border-radius:50%; background:#24A47D; border:2px solid #F5F6F8; margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div>
        <div style="width:28px; height:28px; border-radius:50%; background:#F9AA00; border:2px solid #F5F6F8; margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div>
      </div>
      <span style="color:#7A8C9A; font-size:12px;">
        Bereits <strong style="color:#2C3E50;">400.000+ Haushalte</strong> gespart
      </span>
    </div>

  </div>
</body>
</html>
